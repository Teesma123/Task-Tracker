name: iOS Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          xcodebuild test \
          -project "Task Tracker.xcodeproj" \
          -scheme "Task Tracker" \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5'
